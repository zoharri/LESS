command:
- python3
- ${program}
- ${args}
method: grid
metric:
  goal: maximize
  name: Test all_forces_loss
name: global_gru_poke_seeds
parameters:
  config_path:
    value: configs/GRU_reconstruction_model_real.yaml
  data_loader.batch_size:
    value: 2
  dataset.amount_of_data:
    value: -1
  dataset.data_folder:
    value: data/data_poke_primitive
  dataset.max_traj_length:
    value: 500
  dataset.num_training_trajs:
    value: 100
  dataset.remove_keyword:
    value: primitives
  dataset.sensor_subsample:
    values:
    - 50
  models.rep_learning_model.name:
    value: ReconstructionModel
  models.rep_learning_model.reconstruction_model.input_num_random_samples:
    value: 8
  models.rep_learning_model.reconstruction_model.mask_percentage:
    value: 0
  models.rep_learning_model.reconstruction_model.reconstruction_num_random_samples:
    value: 8
  models.rep_learning_model.reconstruction_model.representation_size:
    value: 1024
  num_epochs:
    value: 1000
  optimizer.disable_downstream_model:
    value: true
  random_seed:
    values:
    - 0
    - 1
    - 2
program: train_rep_and_downstream.py
project: imaging
